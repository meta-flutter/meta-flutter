name: kirkstone-qemux86-64-linux-dummy

on:
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
  release:
    types: [ published, created, edited ]

jobs:

  kirkstone-qemux86-64-linux-dummy:

    env:
      MACHINE: qemux86-64
      YOCTO_BRANCH: kirkstone

    runs-on: [self-hosted, linux]

    container:
      image: ghcr.io/meta-flutter/meta-flutter/ubuntu-24-dev:main
      options:
        --read-only
        --log-driver=none
        --user 1001:1001
        --userns keep-id:uid=1001,gid=1001
        --security-opt label=disable
        --pids-limit=-1
        --storage-opt overlay.mount_program=/usr/bin/fuse-overlayfs
        --storage-opt overlay.mountopt=nodev,metacopy=on,noxattrs=1
        -v /home/runner/.ssh:/home/dev/.ssh:ro
        -v /mnt/raid10/github-ci/download:/home/dev/dl:Z
        -v /mnt/raid10/github-ci/sstate/yocto/kirkstone-linux-dummy:/home/dev/sstate:Z


    steps:

      - uses: actions/checkout@v4
        with:
          path: ''

      - name: Fetch poky
        run: |
          [ -d ../kirkstone-linux-dummy ] || mkdir -p ../kirkstone-linux-dummy
          cd ../kirkstone-linux-dummy
          pwd
          ls -la
          rm -rf poky meta-openembedded meta-clang meta-drm meta-vulkan
          git clone -b ${{ env.YOCTO_BRANCH }} --single-branch git://git.yoctoproject.org/poky &
          git clone -b ${{ env.YOCTO_BRANCH }} --single-branch git://git.openembedded.org/meta-openembedded &
          git clone -b kirkstone-clang18       --single-branch https://github.com/kraj/meta-clang.git &
          git clone -b ${{ env.YOCTO_BRANCH }} --single-branch https://github.com/jwinarske/meta-drm.git &
          git clone -b ${{ env.YOCTO_BRANCH }} --single-branch https://github.com/jwinarske/meta-vulkan.git &
          wait

      - name: Configure build
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          rm -rf build/conf
          . ./poky/oe-init-build-env
          echo '***************************************'
          sed -i '/MACHINE ??=/d' ./conf/local.conf
          echo "MACHINE ??= \"${{ env.MACHINE }}\"" >> ./conf/local.conf
          echo '***************************************'
          # Include CI build configuration to disable SPDX
          echo 'require ../../meta-flutter/conf/distro/include/ci-build.inc' >> ./conf/local.conf
          echo '********** ./conf/local.conf **********'
          cat ./conf/local.conf
          echo '***************************************'
          bitbake-layers show-layers
          bitbake-layers add-layer \
              ../meta-clang \
              ../meta-openembedded/meta-filesystems \
              ../meta-openembedded/meta-gnome \
              ../meta-openembedded/meta-multimedia \
              ../meta-openembedded/meta-networking \
              ../meta-openembedded/meta-oe \
              ../meta-openembedded/meta-python \
              ../meta-clang \
              ../meta-drm \
              ../meta-vulkan \
              ../../meta-flutter \
              ../../meta-flutter/meta-flutter-apps
          bitbake-layers show-layers
          echo '***************************************'
          bitbake -e virtual/kernel | grep "^PV"
          bitbake -e virtual/kernel | grep "^PN"
          echo '***************************************'
          bitbake -e core-image-minimal | grep "^DISTRO_FEATURES"
          echo '***************************************'
          bitbake -e > bb.environment

      - name: Build ca-certificates
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake ca-certificates -c do_cleansstate
          bitbake ca-certificates

      - name: Build ca-certificates-native
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake ca-certificates-native -c do_cleansstate
          bitbake ca-certificates-native

      - name: Build flutter-sdk-native
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake flutter-sdk-native -c do_cleansstate
          bitbake flutter-sdk-native

      - name: Build dart-sdk
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake dart-sdk -c do_cleansstate
          bitbake dart-sdk

      - name: Build flutter-engine
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake flutter-engine -c do_cleansstate
          bitbake flutter-engine

      - name: Build ivi-homescreen
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake ivi-homescreen -c do_cleansstate
          bitbake ivi-homescreen

      - name: Build flutter-auto
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake flutter-auto -c do_cleansstate
          bitbake flutter-auto

      - name: Build flutter-pi
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake flutter-pi -c do_cleansstate
          bitbake flutter-pi

      - name: Build Sony flutter-drm-eglstream-backend
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake flutter-drm-eglstream-backend -c do_cleansstate
          bitbake flutter-drm-eglstream-backend

      - name: Build Sony drm gbm backend
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake flutter-drm-gbm-backend -c do_cleansstate
          bitbake flutter-drm-gbm-backend

      - name: Build Sony external texture plugin
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake toyota-connected-tcna-packages-video-player-video-player-linux-video-player-example -c do_cleansstate
          bitbake toyota-connected-tcna-packages-video-player-video-player-linux-video-player-example

      - name: Build toyota-connected-tcna-packages-flatpak-flutter-example
        shell: bash
        working-directory: ../kirkstone-linux-dummy
        run: |
          . ./poky/oe-init-build-env
          bitbake toyota-connected-tcna-packages-flatpak-flutter-example -c do_cleansstate
          bitbake toyota-connected-tcna-packages-flatpak-flutter-example
